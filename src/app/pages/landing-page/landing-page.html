<section id="banner" class="d-flex justify-content-center align-items-center">
    
    <a routerLink="/login">
        <button class="btn btn-primary btn-lg">Get Started</button>
    </a>
    <!-- String Interpolation -->
     {{welcomeMsg}}



</section>
<!-- property binding -->
 <img [src]="imageUrl" alt="">

 <!-- Event Binding 1-->
  <button (click)="btnClk()">Click Me</button>

 <!-- Event Binding 2 using $event-->
  <input type="text" (change)="getValue($event)">

 <!-- template reference variable  -->
  <input type="text" #age>
  <button (click)="getAge(age)">Get Age</button>

  <form (ngSubmit)="login()">
  <!-- Email input -->
  <div data-mdb-input-init class="form-outline mb-4">
    <input [(ngModel)]="email" name="email" type="email" id="form1Example1" class="form-control" />
    <label class="form-label" for="form1Example1">Email address</label>
  </div>

  <!-- Password input -->
  <div data-mdb-input-init class="form-outline mb-4">
    <input [(ngModel)]="password" name="password" type="email" type="password" id="form1Example2" class="form-control" />
    <label class="form-label" for="form1Example2">Password</label>
  </div>

  <!-- 2 column grid layout for inline styling -->
  <div class="row mb-4">
    <div class="col d-flex justify-content-center">
      <!-- Checkbox -->
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="form1Example3" checked />
        <label class="form-check-label" for="form1Example3"> Remember me </label>
      </div>
    </div>

    <div class="col">
      <!-- Simple link -->
      <a href="#!">Forgot password?</a>
    </div>
  </div>

  <!-- Submit button -->
  @if (isActive){
    <button data-mdb-ripple-init type="submit" class="btn btn-primary btn-block">Sign in</button>
  }

  @for (item of users; track item.id) {
    <p>{{item.id}} {{item.name}}</p>
  }

  @switch (role) {
    @case ('Admin') {
      <p>Admin Page</p>
    }
    @case ('User') {
      <p>User Page</p>
    }
    @default {
      <p>Nil</p>
    }
  }
</form>
